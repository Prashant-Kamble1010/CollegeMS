<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>

    <link rel="stylesheet" href="/css/register.css">
<style>
    body{
    background:#f5f7fa;
    font-family:Segoe UI;
}

.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:400px;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:5px;
}
</style>
</head>
<body>

<div class="container">

    <div class="card">

        <h2>Student Registration</h2>

        <form action="/saveUser" method="post">

            <input type="text"
                   name="name"
                   placeholder="Full Name"
                   required>

            <input type="email"
                   name="email"
                   placeholder="Email"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Register
            </button>

        </form>

    </div>

</div>

</body>
</html>

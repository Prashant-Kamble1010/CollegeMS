<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/css/login.css">
<style>
    body{
    background:#eef2f7;
    font-family:Segoe UI;
}

.login-card{
    width:400px;
    margin:120px auto;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#198754;
    color:white;
    border:none;
}
</style>
</head>

<body>

<div class="login-card">

    <h2>College Login</h2>

    <form action="/loginUser" method="post">

        <input type="email"
               name="email"
               placeholder="Email">

        <input type="password"
               name="password"
               placeholder="Password">

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
